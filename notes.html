<!DOCTYPE html>
<html>
<head>
    <title>Notes</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="hero">
    <h1>Notes</h1>

    <div class="theme-toggle">
    <span id="modeText">Dark Mode</span>
    <label class="toggle-switch">
        <input type="checkbox" onclick="toggleTheme(); updateModeText(this)">
        <span class="slider"></span>
    </label>
</div>
</header>

<section class="cards">
    <div class="card big">
        <textarea id="noteInput" placeholder="Write notes..."></textarea>
        <button onclick="saveNote()">Save</button>
    </div>

    <div class="card big">
        <h3>Saved Notes</h3>
        <p id="savedNote"></p>
    </div>
</section>

<a href="index.html" class="back">⬅ Back</a>

<script src="script.js"></script>
</body>
</html>
